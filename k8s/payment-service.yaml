apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: skydish
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: khairynnnio/payment-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
          env:
            - name: PORT
              value: "5004"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMENT_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: JWT_SECRET
            # ── Paymob ──────────────────────────────────────
            - name: PAYMOB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_API_KEY
            - name: PAYMOB_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_PUBLIC_KEY
            - name: PAYMOB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_SECRET_KEY
            - name: PAYMOB_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_HMAC_SECRET
            - name: PAYMOB_INTEGRATION_ID
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_INTEGRATION_ID
            - name: PAYMOB_IFRAME_ID
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: PAYMOB_IFRAME_ID
            # ── Twilio ──────────────────────────────────────
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: TWILIO_PHONE_NUMBER
            # ── Resend ──────────────────────────────────────
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: skydish-secrets
                  key: RESEND_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5004
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: skydish
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
  type: ClusterIP
