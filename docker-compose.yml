version: "3.8"

networks:
  skydish-net:
    driver: bridge

services:

  # ── Auth Service (:5001) ─────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: skydish-auth
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: ${AUTH_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    networks:
      - skydish-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/auth || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Restaurant Service (:5002) ───────────────────────────
  restaurant-service:
    build: ./backend/restaurant-service
    container_name: skydish-restaurant
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      MONGO_URI: ${RESTAURANT_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - restaurant-uploads:/app/uploads
    networks:
      - skydish-net

  # ── Delivery Service (:5003) ─────────────────────────────
  delivery-service:
    build: ./delivery-service/backend
    container_name: skydish-delivery
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      MONGO_URI: ${DELIVERY_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - skydish-net

  # ── Payment Service (:5004) ──────────────────────────────
  payment-service:
    build: ./backend/payment-service
    container_name: skydish-payment
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      NODE_ENV: development
      MONGO_URI: ${PAYMENT_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      PAYMOB_API_KEY: ${PAYMOB_API_KEY}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY}
      PAYMOB_SECRET_KEY: ${PAYMOB_SECRET_KEY}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET}
      PAYMOB_INTEGRATION_ID: ${PAYMOB_INTEGRATION_ID}
      PAYMOB_IFRAME_ID: ${PAYMOB_IFRAME_ID}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      RESEND_API_KEY: ${RESEND_API_KEY}
    networks:
      - skydish-net

  # ── Order Service (:5005) ────────────────────────────────
  order-service:
    build: ./backend/order-service
    container_name: skydish-order
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      PORT: 5005
      MONGO_URI: ${ORDER_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - skydish-net
    depends_on:
      - auth-service
      - restaurant-service

  # ── Frontend (:3000 → nginx:80) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_AUTH_API_URL: http://localhost:5001
        REACT_APP_RESTAURANT_API_URL: http://localhost:5002
        REACT_APP_DELIVERY_API_URL: http://localhost:5003
        REACT_APP_PAYMENT_API_URL: http://localhost:5004
        REACT_APP_ORDER_API_URL: http://localhost:5005
    container_name: skydish-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - skydish-net
    depends_on:
      - auth-service
      - restaurant-service
      - order-service
      - delivery-service
      - payment-service

volumes:
  restaurant-uploads:
